<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Superfood</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body data-page="home">
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="My Superfood home">
        <span class="brand-mark">M</span>
        <span>My Superfood</span>
      </a>
      <nav class="nav" aria-label="Primary navigation">
        <a href="foods.html">Foods</a>
        <a href="supplements.html">Supplements</a>
        <a href="recipes.html">Recipes</a>
        <a href="lists.html">Lists</a>
        <a href="luminaos.html">LuminaOS</a>
      </nav>
    </header>

    <main class="app-shell">
      <section class="bubble-stage" aria-labelledby="stage-title">
        <div class="visually-hidden">
          <h1 id="stage-title">Explore superfoods</h1>
          <p>Hover or focus a food to see benefits, then add it to your list.</p>
        </div>

        <div class="food-orbit" id="food-orbit" aria-label="Interactive superfood explorer"></div>

        <article class="detail-card" id="detail-card" aria-live="polite">
          <button class="icon-button close-detail" type="button" aria-label="Close detail">x</button>
          <h2 id="detail-title">Broccoli</h2>
          <ul class="benefit-list" id="detail-benefits">
            <li>Fiber rich</li>
            <li>Vitamin C</li>
            <li>Supports gut health</li>
          </ul>
          <button class="button ghost" type="button" id="add-to-list">Add to list</button>
          <a class="button primary" id="open-detail" href="foods.html#broccoli">Open detail</a>
          <p class="saved-note" id="saved-note" role="status"></p>
        </article>

        <div class="filter-bar" aria-label="Nutrition filters">
          <button class="filter-button" type="button" data-filter="protein">Protein</button>
          <button class="filter-button" type="button" data-filter="carbs">Carbs</button>
          <button class="filter-button" type="button" data-filter="oils">Oils</button>
          <button class="filter-button active" type="button" data-filter="fiber">Fiber</button>
          <button class="filter-button" type="button" data-filter="advanced">Advanced nutrients</button>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
