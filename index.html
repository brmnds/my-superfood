<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Superfood</title>
    <meta name="description" content="Explore superfoods, supplement products, healthy recipes, and saved nutrition lists with My Superfood.">
    <link rel="canonical" href="https://my-superfood.com/">
    <meta property="og:title" content="My Superfood">
    <meta property="og:description" content="Explore superfoods, supplement products, healthy recipes, and saved nutrition lists.">
    <meta property="og:url" content="https://my-superfood.com/">
    <meta property="og:type" content="website">
    <link rel="icon" type="image/png" sizes="512x512" href="/assets/images/my-superfood-icon-512.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/images/my-superfood-icon.png">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body data-page="home">
    <header class="site-header">
      <a class="brand" href="/" aria-label="My Superfood home">
        <img class="brand-mark" src="/assets/images/my-superfood-icon.png" alt="" aria-hidden="true">
        <span>My Superfood</span>
      </a>
      <nav class="nav" aria-label="Primary navigation">
        <a href="/foods">Foods</a>
        <a href="/supplements">Supplements</a>
        <a href="/recipes">Recipes</a>
        <a href="/lists">Lists</a>
        <a href="/luminaos">LuminaOS</a>
      </nav>
    </header>

    <main class="app-shell">
      <section class="bubble-stage" aria-labelledby="stage-title">
        <div class="visually-hidden">
          <h1 id="stage-title">Explore superfoods</h1>
          <p>Click a food to see benefits, then add it to your list.</p>
        </div>

        <div class="food-orbit" id="food-orbit" aria-label="Interactive superfood explorer"></div>

        <article class="detail-card is-hidden" id="detail-card" aria-live="polite">
          <button class="icon-button close-detail" type="button" aria-label="Close detail">x</button>
          <img class="detail-image" id="detail-image" src="assets/images/real/broccoli.jpg" alt="Broccoli" draggable="false">
          <h2 id="detail-title">Broccoli</h2>
          <ul class="benefit-list" id="detail-benefits">
            <li>Fiber rich</li>
            <li>Vitamin C</li>
            <li>Supports gut health</li>
          </ul>
          <button class="button ghost" type="button" id="add-to-list">Add to list</button>
          <a class="button primary" id="open-detail" href="/foods#broccoli">Open detail</a>
          <p class="saved-note" id="saved-note" role="status"></p>
        </article>

        <div class="filter-bar" aria-label="Nutrition filters">
          <button class="filter-button active" type="button" data-filter="all">View all</button>
          <button class="filter-button" type="button" data-filter="protein">Protein</button>
          <button class="filter-button" type="button" data-filter="carbs">Carbs</button>
          <button class="filter-button" type="button" data-filter="oils">Oils</button>
          <button class="filter-button" type="button" data-filter="fiber">Fiber</button>
          <button class="filter-button" type="button" data-filter="advanced">Advanced nutrients</button>
          <button class="filter-button" type="button" data-filter="tilman">Tilman</button>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
