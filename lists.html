<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lists - My Superfood</title>
    <meta name="description" content="Review foods and supplements saved in this browser or synced with an optional LuminaOS account.">
    <link rel="canonical" href="https://my-superfood.com/lists">
    <meta property="og:title" content="Lists - My Superfood">
    <meta property="og:description" content="Review saved foods and supplements with optional LuminaOS sync.">
    <meta property="og:url" content="https://my-superfood.com/lists">
    <meta property="og:type" content="website">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body data-page="lists">
    <header class="site-header">
      <a class="brand" href="/"><span class="brand-mark">M</span><span>My Superfood</span></a>
      <nav class="nav" aria-label="Primary navigation">
        <a href="/foods">Foods</a>
        <a href="/supplements">Supplements</a>
        <a href="/recipes">Recipes</a>
        <a class="active" href="/lists">Lists</a>
        <a href="/luminaos">LuminaOS</a>
      </nav>
    </header>
    <main class="page-shell">
      <section class="page-heading">
        <p class="eyebrow">Saved list</p>
        <h1>Foods and supplements you want to keep close.</h1>
        <p id="saved-list-intro">Saved in this browser. Sign in with LuminaOS to sync your list.</p>
        <div class="account-sync-panel">
          <p data-auth-status>Checking LuminaOS sync...</p>
          <div class="lumina-actions" data-auth-actions></div>
        </div>
      </section>
      <section class="catalog-grid" id="saved-list" aria-label="Saved foods and supplements"></section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
